<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌊 Haze Seas — 寻宝探险</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0b1220;
      font-family: 'Inter', system-ui, sans-serif;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #ui {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .info-box {
      background: rgba(11, 18, 32, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(245, 185, 77, 0.3);
      border-radius: 12px;
      padding: 10px 24px;
      text-align: center;
    }
    .info-box .label {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 1px;
      font-weight: 500;
    }
    .info-box .value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #f5b94d;
      line-height: 1;
    }
    .info-box.blue .value { color: #3aa9ff; }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      max-width: 500px;
      width: 100%;
      aspect-ratio: 1;
    }
    .cell {
      background: #111a2e;
      border: 2px solid rgba(58, 169, 255, 0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }
    .cell:hover:not(.revealed) {
      background: #1a2640;
      border-color: rgba(245, 185, 77, 0.4);
      transform: scale(1.05);
    }
    .cell.revealed {
      cursor: default;
      animation: reveal 0.3s ease;
    }
    .cell.treasure {
      background: rgba(245, 185, 77, 0.15);
      border-color: rgba(245, 185, 77, 0.5);
    }
    .cell.trap {
      background: rgba(255, 80, 80, 0.15);
      border-color: rgba(255, 80, 80, 0.5);
    }
    .cell.empty {
      background: rgba(17, 26, 46, 0.5);
      opacity: 0.6;
    }
    @keyframes reveal {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    #startScreen, #gameOverScreen, #winScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(11, 18, 32, 0.92);
      backdrop-filter: blur(10px);
      z-index: 20;
    }
    #gameOverScreen, #winScreen { display: none; }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      background: linear-gradient(135deg, #f5b94d 0%, #3aa9ff 50%, #f5b94d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    .subtitle {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 40px;
      text-align: center;
      max-width: 420px;
      line-height: 1.5;
    }
    .btn {
      background: linear-gradient(135deg, #f5b94d, #e0a020);
      color: #0b1220;
      border: none;
      padding: 16px 48px;
      font-size: 22px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 3px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(245, 185, 77, 0.4);
      transition: all 0.2s ease;
    }
    .btn:hover { transform: scale(1.05); }
    .final-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      color: #f5b94d;
      margin-bottom: 8px;
    }
    .instructions {
      margin-top: 32px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .instruction-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
      font-size: 13px;
    }
    @media (max-width: 768px) {
      .title { font-size: 42px; }
      .cell { font-size: 24px; }
      .info-box .value { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="ui">
      <div class="info-box"><div class="label">SCORE</div><div class="value" id="scoreDisplay">0</div></div>
      <div class="info-box blue"><div class="label">STEPS LEFT</div><div class="value" id="stepsDisplay">15</div></div>
      <div class="info-box"><div class="label">TREASURES</div><div class="value" id="treasuresDisplay">0/5</div></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div id="startScreen">
    <div class="title">TREASURE HUNT</div>
    <div class="subtitle">在6×6的网格中挖掘宝藏！避开陷阱，15步内找到所有宝藏即可获胜。</div>
    <button class="btn" id="startBtn">START HUNT</button>
    <div class="instructions">
      <div class="instruction-item">💎 宝藏 +100分</div>
      <div class="instruction-item">💣 陷阱 -50分</div>
      <div class="instruction-item">⚓ 空格 0分</div>
    </div>
  </div>

  <div id="winScreen">
    <div class="title">VICTORY!</div>
    <div class="final-score" id="winScore">0</div>
    <div class="subtitle">所有宝藏已找到！</div>
    <button class="btn" id="winRestartBtn">PLAY AGAIN</button>
  </div>

  <div id="gameOverScreen">
    <div class="title">GAME OVER</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="subtitle" id="endReason">步数用完了！</div>
    <button class="btn" id="restartBtn">TRY AGAIN</button>
  </div>

  <script>
    const GRID_SIZE = 6;
    const MAX_STEPS = 15;
    const TREASURE_COUNT = 5;
    const TRAP_COUNT = 6;

    let grid = [];
    let score = 0;
    let stepsLeft = MAX_STEPS;
    let treasuresFound = 0;
    let gameRunning = false;

    function initGrid() {
      grid = [];
      for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
        grid.push({ type: 'empty', revealed: false });
      }
      // 随机放置宝藏
      const indices = Array.from({length: GRID_SIZE * GRID_SIZE}, (_, i) => i);
      // 洗牌
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      let idx = 0;
      for (let i = 0; i < TREASURE_COUNT; i++) grid[indices[idx++]].type = 'treasure';
      for (let i = 0; i < TRAP_COUNT; i++) grid[indices[idx++]].type = 'trap';
    }

    function renderGrid() {
      const gridEl = document.getElementById('grid');
      gridEl.innerHTML = '';
      grid.forEach((cell, i) => {
        const cellEl = document.createElement('div');
        cellEl.className = 'cell';
        if (cell.revealed) {
          cellEl.classList.add('revealed', cell.type);
          if (cell.type === 'treasure') cellEl.textContent = '💎';
          else if (cell.type === 'trap') cellEl.textContent = '💣';
          else cellEl.textContent = '⚓';
        }
        cellEl.addEventListener('click', () => dig(i));
        gridEl.appendChild(cellEl);
      });
    }

    function dig(idx) {
      if (!gameRunning) return;
      if (grid[idx].revealed) return;
      if (stepsLeft <= 0) return;

      grid[idx].revealed = true;
      stepsLeft--;

      if (grid[idx].type === 'treasure') {
        score += 100;
        treasuresFound++;
      } else if (grid[idx].type === 'trap') {
        score -= 50;
      }

      updateUI();
      renderGrid();

      if (treasuresFound >= TREASURE_COUNT) {
        setTimeout(() => endGame(true), 500);
        return;
      }

      if (stepsLeft <= 0) {
        setTimeout(() => endGame(false), 500);
      }
    }

    function updateUI() {
      document.getElementById('scoreDisplay').textContent = score;
      document.getElementById('stepsDisplay').textContent = stepsLeft;
      document.getElementById('treasuresDisplay').textContent = `${treasuresFound}/${TREASURE_COUNT}`;
    }

    function endGame(won) {
      gameRunning = false;
      if (won) {
        document.getElementById('winScore').textContent = score;
        document.getElementById('winScreen').style.display = 'flex';
      } else {
        document.getElementById('finalScore').textContent = score;
        document.getElementById('endReason').textContent = '步数用完了！';
        document.getElementById('gameOverScreen').style.display = 'flex';
      }
    }

    function startGame() {
      gameRunning = true;
      score = 0;
      stepsLeft = MAX_STEPS;
      treasuresFound = 0;
      initGrid();
      renderGrid();
      updateUI();
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'none';
      document.getElementById('winScreen').style.display = 'none';
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('winRestartBtn').addEventListener('click', startGame);
  </script>
</body>
</html>
