<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌊 Haze Seas — 记忆翻牌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0b1220;
      font-family: 'Inter', system-ui, sans-serif;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #ui {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .info-box {
      background: rgba(11, 18, 32, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(245, 185, 77, 0.3);
      border-radius: 12px;
      padding: 10px 24px;
      text-align: center;
    }
    .info-box .label {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 1px;
      font-weight: 500;
    }
    .info-box .value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #f5b94d;
      line-height: 1;
    }
    .info-box.blue .value { color: #3aa9ff; }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 480px;
      width: 100%;
      aspect-ratio: 1;
    }
    .card {
      perspective: 600px;
      cursor: pointer;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.4s ease;
      transform-style: preserve-3d;
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }
    .card.matched {
      pointer-events: none;
    }
    .card.matched .card-face-front {
      background: rgba(245, 185, 77, 0.2);
      border-color: rgba(245, 185, 77, 0.6);
      box-shadow: 0 0 20px rgba(245, 185, 77, 0.3);
    }
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 2px solid;
      transition: all 0.2s ease;
    }
    .card-face-back {
      background: linear-gradient(135deg, #111a2e, #1a2640);
      border-color: rgba(58, 169, 255, 0.25);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: rgba(58, 169, 255, 0.3);
      letter-spacing: 2px;
    }
    .card:hover:not(.flipped):not(.matched) .card-face-back {
      border-color: rgba(245, 185, 77, 0.4);
      background: linear-gradient(135deg, #1a2640, #243355);
    }
    .card-face-front {
      background: #111a2e;
      border-color: rgba(245, 185, 77, 0.3);
      transform: rotateY(180deg);
      font-size: 42px;
    }
    #startScreen, #gameOverScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(11, 18, 32, 0.92);
      backdrop-filter: blur(10px);
      z-index: 20;
    }
    #gameOverScreen { display: none; }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      background: linear-gradient(135deg, #f5b94d 0%, #3aa9ff 50%, #f5b94d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    .subtitle {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 40px;
      text-align: center;
      max-width: 420px;
      line-height: 1.5;
    }
    .btn {
      background: linear-gradient(135deg, #f5b94d, #e0a020);
      color: #0b1220;
      border: none;
      padding: 16px 48px;
      font-size: 22px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 3px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(245, 185, 77, 0.4);
      transition: all 0.2s ease;
    }
    .btn:hover { transform: scale(1.05); }
    .final-info {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      color: #f5b94d;
      margin-bottom: 16px;
    }
    .stat-row {
      display: flex;
      gap: 32px;
      margin-bottom: 32px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .stat-label {
      font-size: 12px;
      color: #94a3b8;
      letter-spacing: 1px;
    }
    .stat-item .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: #3aa9ff;
    }
    @media (max-width: 768px) {
      .title { font-size: 42px; }
      .card-face-front { font-size: 28px; }
      .card-face-back { font-size: 24px; }
      .info-box .value { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="ui">
      <div class="info-box"><div class="label">MOVES</div><div class="value" id="movesDisplay">0</div></div>
      <div class="info-box blue"><div class="label">TIME</div><div class="value" id="timeDisplay">0.0s</div></div>
      <div class="info-box"><div class="label">MATCHED</div><div class="value" id="matchedDisplay">0/8</div></div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <div id="startScreen">
    <div class="title">MEMORY CARDS</div>
    <div class="subtitle">翻开卡牌找到配对的恶魔果实！8对图案，用最少步数完成挑战。</div>
    <button class="btn" id="startBtn">START GAME</button>
  </div>

  <div id="gameOverScreen">
    <div class="title">VICTORY!</div>
    <div class="stat-row">
      <div class="stat-item">
        <div class="stat-label">MOVES</div>
        <div class="stat-value" id="finalMoves">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">TIME</div>
        <div class="stat-value" id="finalTime">0.0s</div>
      </div>
    </div>
    <button class="btn" id="restartBtn">PLAY AGAIN</button>
  </div>

  <script>
    const FRUITS = ['🍎', '🍇', '🍌', '🍒', '🥭', '🍑', '🍍', '🥥'];
    let cards = [];
    let flipped = [];
    let matched = 0;
    let moves = 0;
    let startTime = 0;
    let timerInterval = null;
    let gameRunning = false;
    let canFlip = true;

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initCards() {
      const pairs = [...FRUITS, ...FRUITS];
      cards = shuffleArray(pairs).map((fruit, i) => ({
        id: i,
        fruit: fruit,
        flipped: false,
        matched: false,
      }));
    }

    function renderGrid() {
      const gridEl = document.getElementById('cardGrid');
      gridEl.innerHTML = '';
      cards.forEach(card => {
        const cardEl = document.createElement('div');
        cardEl.className = 'card';
        if (card.flipped) cardEl.classList.add('flipped');
        if (card.matched) cardEl.classList.add('matched');
        cardEl.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-face-back">☠</div>
            <div class="card-face card-face-front">${card.fruit}</div>
          </div>
        `;
        cardEl.addEventListener('click', () => flipCard(card.id));
        gridEl.appendChild(cardEl);
      });
    }

    function flipCard(id) {
      if (!gameRunning || !canFlip) return;
      const card = cards[id];
      if (card.flipped || card.matched) return;

      card.flipped = true;
      flipped.push(card);
      renderGrid();

      if (flipped.length === 2) {
        canFlip = false;
        moves++;
        document.getElementById('movesDisplay').textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (a.fruit === b.fruit) {
        setTimeout(() => {
          a.matched = true;
          b.matched = true;
          matched++;
          flipped = [];
          canFlip = true;
          updateUI();
          renderGrid();
          if (matched >= FRUITS.length) {
            endGame();
          }
        }, 500);
      } else {
        setTimeout(() => {
          a.flipped = false;
          b.flipped = false;
          flipped = [];
          canFlip = true;
          renderGrid();
        }, 1000);
      }
    }

    function updateUI() {
      document.getElementById('matchedDisplay').textContent = `${matched}/${FRUITS.length}`;
    }

    function updateTimer() {
      const elapsed = (Date.now() - startTime) / 1000;
      document.getElementById('timeDisplay').textContent = elapsed.toFixed(1) + 's';
    }

    function startGame() {
      gameRunning = true;
      matched = 0;
      moves = 0;
      flipped = [];
      canFlip = true;
      initCards();
      renderGrid();
      updateUI();
      document.getElementById('movesDisplay').textContent = '0';
      document.getElementById('timeDisplay').textContent = '0.0s';
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'none';
      startTime = Date.now();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 100);
    }

    function endGame() {
      gameRunning = false;
      if (timerInterval) clearInterval(timerInterval);
      const elapsed = (Date.now() - startTime) / 1000;
      document.getElementById('finalMoves').textContent = moves;
      document.getElementById('finalTime').textContent = elapsed.toFixed(1) + 's';
      document.getElementById('gameOverScreen').style.display = 'flex';
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
  </script>
</body>
</html>
