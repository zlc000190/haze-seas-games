<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌊 Haze Seas — 射击训练</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0b1220;
      font-family: 'Inter', system-ui, sans-serif;
      touch-action: none;
      cursor: crosshair;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #ui {
      position: absolute;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 10;
    }
    .score-box {
      background: rgba(11, 18, 32, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(245, 185, 77, 0.3);
      border-radius: 12px;
      padding: 10px 20px;
      color: #f5b94d;
      display: flex;
      gap: 24px;
    }
    .stat {
      text-align: center;
    }
    .stat .label {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 1px;
      font-weight: 500;
    }
    .stat .value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 2px;
    }
    #startScreen, #gameOverScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(11, 18, 32, 0.92);
      backdrop-filter: blur(10px);
      z-index: 20;
      cursor: default;
    }
    #gameOverScreen { display: none; }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      background: linear-gradient(135deg, #f5b94d 0%, #3aa9ff 50%, #f5b94d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    .subtitle {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 40px;
      text-align: center;
      max-width: 420px;
      line-height: 1.5;
    }
    .btn {
      background: linear-gradient(135deg, #f5b94d, #e0a020);
      color: #0b1220;
      border: none;
      padding: 16px 48px;
      font-size: 22px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 3px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(245, 185, 77, 0.4);
      transition: all 0.2s ease;
    }
    .btn:hover { transform: scale(1.05); }
    .instructions {
      margin-top: 32px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .instruction-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
      font-size: 13px;
    }
    .instruction-item span {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
    }
    .final-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      color: #f5b94d;
      margin-bottom: 8px;
    }
    .stat-row {
      display: flex;
      gap: 40px;
      margin-bottom: 32px;
    }
    .stat-item { text-align: center; }
    .stat-item .stat-label {
      font-size: 12px;
      color: #94a3b8;
      letter-spacing: 1px;
    }
    .stat-item .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      color: #3aa9ff;
    }
    @media (max-width: 768px) {
      .title { font-size: 42px; }
      .instructions { gap: 12px; }
      .instruction-item { font-size: 11px; }
      .stat .value { font-size: 20px; }
      .stat-row { gap: 20px; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div class="score-box">
      <div class="stat"><div class="label">SCORE</div><div class="value" id="scoreDisplay">0</div></div>
      <div class="stat"><div class="label">TIME</div><div class="value" id="timeDisplay">30</div></div>
      <div class="stat"><div class="label">ACCURACY</div><div class="value" id="accDisplay">0%</div></div>
    </div>
  </div>

  <div id="startScreen">
    <div class="title">SHOOTING RANGE</div>
    <div class="subtitle">瞄准从右向左移动的靶子！30秒限时，不同靶子不同分值，挑战最高分！</div>
    <button class="btn" id="startBtn">START SHOOTING</button>
    <div class="instructions">
      <div class="instruction-item"><span>CLICK</span> 射击</div>
      <div class="instruction-item">🎯 普通靶 +10</div>
      <div class="instruction-item">⭐ 金靶 +25</div>
      <div class="instruction-item">💀 骷髅 +50</div>
    </div>
  </div>

  <div id="gameOverScreen">
    <div class="title">TIME'S UP</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="stat-row">
      <div class="stat-item">
        <div class="stat-label">SHOTS</div>
        <div class="stat-value" id="finalShots">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">HITS</div>
        <div class="stat-value" id="finalHits">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">ACCURACY</div>
        <div class="stat-value" id="finalAcc">0%</div>
      </div>
    </div>
    <button class="btn" id="restartBtn">SHOOT AGAIN</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gameRunning = false;
    let score = 0;
    let timeLeft = 30;
    let shots = 0;
    let hits = 0;
    let targets = [];
    let particles = [];
    let crosshair = { x: 0, y: 0 };
    let timerInterval = null;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const targetTypes = [
      { emoji: '🎯', score: 10, speed: 2.5, size: 40, rarity: 0.5, color: '#3aa9ff' },
      { emoji: '⭐', score: 25, speed: 3.5, size: 32, rarity: 0.3, color: '#f5b94d' },
      { emoji: '💀', score: 50, speed: 4.5, size: 36, rarity: 0.2, color: '#ff5050' },
    ];

    function spawnTarget() {
      const rand = Math.random();
      let cum = 0;
      let type = targetTypes[0];
      for (const t of targetTypes) {
        cum += t.rarity;
        if (rand <= cum) { type = t; break; }
      }
      targets.push({
        x: canvas.width + 30,
        y: 80 + Math.random() * (canvas.height - 200),
        type: type,
        wobble: Math.random() * Math.PI * 2,
        alive: true,
      });
    }

    function createParticles(x, y, color, count = 10) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8,
          radius: Math.random() * 4 + 2,
          color: color,
          life: 1,
          decay: Math.random() * 0.04 + 0.02,
        });
      }
    }

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      crosshair.x = e.clientX - rect.left;
      crosshair.y = e.clientY - rect.top;
    });

    canvas.addEventListener('click', e => {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      shots++;
      let hit = false;
      for (const t of targets) {
        if (!t.alive) continue;
        const dx = t.x - cx;
        const dy = t.y - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < t.type.size) {
          t.alive = false;
          score += t.type.score;
          hits++;
          hit = true;
          createParticles(t.x, t.y, t.type.color, 15);
          break;
        }
      }
      if (!hit) {
        createParticles(cx, cy, '#666', 4);
      }
      updateUI();
    });

    // Touch support
    canvas.addEventListener('touchstart', e => {
      if (!gameRunning) return;
      e.preventDefault();
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const cx = touch.clientX - rect.left;
      const cy = touch.clientY - rect.top;
      crosshair.x = cx;
      crosshair.y = cy;
      shots++;
      let hit = false;
      for (const t of targets) {
        if (!t.alive) continue;
        const dx = t.x - cx;
        const dy = t.y - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < t.type.size) {
          t.alive = false;
          score += t.type.score;
          hits++;
          hit = true;
          createParticles(t.x, t.y, t.type.color, 15);
          break;
        }
      }
      if (!hit) {
        createParticles(cx, cy, '#666', 4);
      }
      updateUI();
    });

    function updateUI() {
      document.getElementById('scoreDisplay').textContent = score;
      document.getElementById('timeDisplay').textContent = Math.ceil(timeLeft);
      const acc = shots > 0 ? Math.round((hits / shots) * 100) : 0;
      document.getElementById('accDisplay').textContent = acc + '%';
    }

    function update() {
      if (!gameRunning) return;

      timeLeft -= 1/60;
      if (timeLeft <= 0) {
        timeLeft = 0;
        endGame();
      }

      // Spawn
      if (Math.random() < 0.03) spawnTarget();

      // Move targets
      targets = targets.filter(t => {
        t.x -= t.type.speed;
        t.wobble += 0.05;
        t.y += Math.sin(t.wobble) * 0.5;
        return t.alive && t.x > -50;
      });

      // Particles
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life -= p.decay;
        return p.life > 0;
      });

      updateUI();
    }

    function draw() {
      // 背景
      const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.height);
      grad.addColorStop(0, '#111a2e');
      grad.addColorStop(0.5, '#0b1220');
      grad.addColorStop(1, '#070d18');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 远景海平面
      const seaY = canvas.height * 0.7;
      ctx.fillStyle = 'rgba(58, 169, 255, 0.04)';
      ctx.fillRect(0, seaY, canvas.width, canvas.height - seaY);
      ctx.strokeStyle = 'rgba(58, 169, 255, 0.15)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        for (let x = 0; x < canvas.width; x += 5) {
          const y = seaY + i * 20 + Math.sin(x * 0.02 + Date.now() * 0.002 + i) * 6;
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // 准星
      if (gameRunning) {
        ctx.save();
        ctx.translate(crosshair.x, crosshair.y);
        ctx.strokeStyle = '#f5b94d';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 18, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-25, 0); ctx.lineTo(-8, 0);
        ctx.moveTo(8, 0); ctx.lineTo(25, 0);
        ctx.moveTo(0, -25); ctx.lineTo(0, -8);
        ctx.moveTo(0, 8); ctx.lineTo(0, 25);
        ctx.stroke();
        ctx.fillStyle = 'rgba(245, 185, 77, 0.3)';
        ctx.beginPath();
        ctx.arc(0, 0, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // 靶子
      targets.forEach(t => {
        if (!t.alive) return;
        // 光晕
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.type.size * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = t.type.color + '15';
        ctx.fill();
        // emoji
        ctx.save();
        ctx.font = `${t.type.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = t.type.color;
        ctx.shadowBlur = 12;
        ctx.fillText(t.type.emoji, t.x, t.y);
        ctx.restore();
      });

      // 粒子
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function gameLoop() {
      if (gameRunning) {
        update();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      gameRunning = true;
      score = 0;
      timeLeft = 30;
      shots = 0;
      hits = 0;
      targets = [];
      particles = [];
      updateUI();
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'none';
    }

    function endGame() {
      gameRunning = false;
      const acc = shots > 0 ? Math.round((hits / shots) * 100) : 0;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('finalShots').textContent = shots;
      document.getElementById('finalHits').textContent = hits;
      document.getElementById('finalAcc').textContent = acc + '%';
      document.getElementById('gameOverScreen').style.display = 'flex';
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    // Attract loop
    function attractLoop() {
      if (!gameRunning) {
        const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.height);
        grad.addColorStop(0, '#111a2e');
        grad.addColorStop(0.5, '#0b1220');
        grad.addColorStop(1, '#070d18');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(58, 169, 255, 0.1)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          for (let x = 0; x < canvas.width; x += 5) {
            const y = canvas.height/2 + Math.sin(x * 0.02 + Date.now() * 0.002 + i) * 25 + i * 35;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }
      requestAnimationFrame(attractLoop);
    }

    gameLoop();
    attractLoop();
  </script>
</body>
</html>
